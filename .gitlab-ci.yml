stages:
  - test
  - build
  - docker

# ---------- Backend: PHPUnit (unit + feature) ----------
backend:tests:
  stage: test
  image: php:8.4-cli
  services:
    - name: mysql:8.0
      alias: mysql
  variables:
    MYSQL_DATABASE: alab_test
    MYSQL_USER: alab
    MYSQL_PASSWORD: alabpass
    MYSQL_ROOT_PASSWORD: rootpass
    APP_ENV: ci
    APP_DEBUG: "true"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git unzip libzip-dev default-mysql-client && rm -rf /var/lib/apt/lists/*
    - docker-php-ext-install pdo_mysql zip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - cd backend
    - |
      cat > .env.ci <<'EOF'
      APP_NAME=Alab-BE
      APP_ENV=ci
      APP_KEY=
      APP_DEBUG=true
      APP_URL=http://localhost

      DB_CONNECTION=mysql
      DB_HOST=mysql
      DB_PORT=3306
      DB_DATABASE=alab_test
      DB_USERNAME=alab
      DB_PASSWORD=alabpass

      CACHE_STORE=array
      QUEUE_CONNECTION=sync
      SESSION_DRIVER=array
      MAIL_MAILER=array

      JWT_SECRET=testing-secret
      EOF
    - composer install --no-interaction --prefer-dist --no-progress
    - php artisan key:generate --ansi
    - php artisan config:clear
    - php artisan migrate --force
  script:
    - php artisan test --ansi
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - backend/storage/logs/

# ---------- Frontend: build ----------
frontend:build:
  stage: build
  image: node:20-alpine
  before_script:
    - cd frontend
  script:
    - npm ci
    - npm run build
  artifacts:
    expire_in: 7 days
    paths:
      - frontend/dist/

# ---------- Docker: build & push images ----------
docker:build_and_push:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    # Backend image
    - docker build -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE/backend:latest" ./backend
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/backend:latest"
    # Frontend image
    - docker build -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE/frontend:latest" ./frontend
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/frontend:latest"
  rules:
    - if: $CI_COMMIT_BRANCH
